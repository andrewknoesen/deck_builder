services:
  backend:
    env_file:
      - backend/.env
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SKIP_COPY: ${SKIP_COPY:-true}
    working_dir: /app/backend
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/deck_builder
      - SCRYFALL_BASE_URL=https://api.scryfall.com
      - UV_LINK_MODE=copy
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_SERVER_LOG_LEVEL=DEBUG
    # Keep the reload flag in command
    # Wait for DB to be ready ideally, or rely on restart_policy. 
    # For simplicity in dev, we just run. Optional: add a wait-for script.
    depends_on:
      - db
    command: sh -c "uv run python prestart.py && uv run alembic upgrade head && uv run python -m app.initial_data && uv run python -m app.ai.ingestion.rules_ingestion && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 45s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - mtg-network

  db:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mtg-network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deck_builder
    ports:
      - "5432:5432"

  chromadb:
    image: chromadb/chroma
    container_name: mtg-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
      - ./backups:/backups  # Optional: for backups
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE  # Set to FALSE in production
      - CHROMA_SERVER_AUTH_PROVIDER=${CHROMA_SERVER_AUTH_PROVIDER:-}
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_SERVER_AUTH_CREDENTIALS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
    networks:
      - mtg-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    # Install deps if needed (check first) then run dev
    # We use sh -c to ensure we can install if node_modules missing
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - mtg-network
    # depends_on:
    #   backend:
    #      condition: service_healthy

volumes:
  postgres_data:
  chromadb-data:
    driver: local

networks:
  mtg-network:
    driver: bridge